name: Deploy Backend Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-prod-deploy
  cancel-in-progress: true

jobs:
  verify-fast:
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Required production gate
        run: yarn verify:fast

  migration-check:
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: verify-fast

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build before migration check
        run: yarn build

      - name: Run migrations against CI database
        run: NODE_ENV=ci yarn migration:run

      - name: Check migrations
        run: yarn migration:check

  deploy:
    if: github.event_name != 'workflow_dispatch' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs:
      - verify-fast
      - migration-check
    environment:
      name: production

    env:
      NODE_VERSION: '22'
      REMOTE_APP_DIR: /home/ec2-user/dongle.server.prod
      REMOTE_ENV_FILE: .env.production
      PM2_CONFIG: ecosystem.prod.config.js
      HEALTHCHECK_URL: http://127.0.0.1:5000/v1/healthCheck
      EXTERNAL_HEALTHCHECK_URL: ${{ secrets.PROD_EXTERNAL_HEALTHCHECK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Package release
        run: |
          tar -czf backend-prod.tar.gz \
            dist \
            package.json \
            yarn.lock \
            ecosystem.prod.config.js

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.key
          chmod 600 ~/.ssh/lightsail.key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp -i ~/.ssh/lightsail.key backend-prod.tar.gz \
            "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/backend-prod.tar.gz"

      - name: Deploy on Lightsail
        run: |
          ssh -i ~/.ssh/lightsail.key "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" /bin/bash <<'EOF'
          set -euo pipefail
          mkdir -p "${{ env.REMOTE_APP_DIR }}"
          cd "${{ env.REMOTE_APP_DIR }}"

          test -f "${{ env.REMOTE_ENV_FILE }}"

          rm -rf .release.bak
          if [ -d dist ]; then
            mkdir -p .release.bak
            cp -r dist package.json yarn.lock "${{ env.PM2_CONFIG }}" .release.bak/
          fi

          rm -rf dist
          tar -xzf /tmp/backend-prod.tar.gz -C "${{ env.REMOTE_APP_DIR }}"
          rm -f /tmp/backend-prod.tar.gz

          yarn install --frozen-lockfile --production=true </dev/null
          NODE_ENV=production yarn migration:show </dev/null
          NODE_ENV=production yarn migration:run </dev/null
          pm2 startOrReload "${{ env.PM2_CONFIG }}" --update-env </dev/null
          sleep 5

          for i in $(seq 1 20); do
            if curl --fail --silent "${{ env.HEALTHCHECK_URL }}" >/dev/null; then
              exit 0
            fi
            sleep 3
          done

          exit 1
          EOF

      - name: Check external health
        run: |
          set -euo pipefail
          test -n "${EXTERNAL_HEALTHCHECK_URL}"

          for i in $(seq 1 20); do
            if curl --fail --silent "${EXTERNAL_HEALTHCHECK_URL}" >/dev/null; then
              exit 0
            fi
            sleep 3
          done

          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/lightsail.key "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" /bin/bash <<'EOF'
          set -euo pipefail
          cd "${{ env.REMOTE_APP_DIR }}"

          if [ ! -d .release.bak ]; then
            echo "이전 release 백업이 없어 자동 롤백할 수 없습니다. 수동 조치가 필요합니다."
            exit 1
          fi

          rm -rf dist package.json yarn.lock "${{ env.PM2_CONFIG }}"
          cp -r .release.bak/dist .release.bak/package.json .release.bak/yarn.lock \
            ".release.bak/${{ env.PM2_CONFIG }}" .

          yarn install --frozen-lockfile --production=true </dev/null
          pm2 startOrReload "${{ env.PM2_CONFIG }}" --update-env </dev/null
          sleep 5

          for i in $(seq 1 20); do
            if curl --fail --silent "${{ env.HEALTHCHECK_URL }}" >/dev/null; then
              echo "롤백 성공: 이전 release로 복원되었습니다."
              exit 0
            fi
            sleep 3
          done

          echo "롤백 후에도 헬스체크가 실패했습니다. 즉시 수동 점검이 필요합니다."
          exit 1
          EOF
